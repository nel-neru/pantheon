# モデルティアリング設定 — task_type → ティア → claude CLI の --model エイリアス
#
# 「作業内容に応じたモデルの使い分け」の中枢設定。alias（fable/sonnet/haiku 等）で
# 指定するためモデル ID の世代交代に追従不要。優先順位は
#   明示 model 引数 ＞ このルーター ＞ PANTHEON_DEFAULT_MODEL
# で、PANTHEON_MODEL_ROUTING=0 にするとルーター全体を無効化できる（キルスイッチ）。
# このファイルが欠落・破損していても内蔵デフォルト（同内容）で動作する。
#
# heavy ティアは長時間・自律実行に最強の Fable 5（alias `fable`）を割り当てる
# （Master Plan §9）。opus に戻す場合は heavy を opus に変更すればよい（即時・無停止）。
# 「即時・無停止」はこのファイルの mtime 変化を get_router() が検知して自動再読込する
# ため成立する（稼働中デーモンも次の生成から反映。model_router.get_router 参照）。

tiers:
  heavy: fable     # 高難度/長時間自律: コード改変・メタ改善・セキュリティ（Fable 5）
  standard: sonnet # 標準: レビュー・コンテンツ生成・探索
  light: haiku     # 軽量: 会話・要約・スコアリング・コンパクション

default_tier: standard

task_tiers:
  improvement_execution: heavy
  meta_improvement: heavy
  security_audit: heavy
  code_review: standard
  quality_review: standard
  content_generation: standard
  codebase_exploration: standard
  conversation: light
  compaction: light
  scoring: light
  summarize: light

# プロンプトがこの文字数を超えるタスクは 1 ティア上げる（大きい文脈の理解力を優先）
escalate_above_prompt_chars: 20000
