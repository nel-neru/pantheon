# AIツール/SaaS アフィリエイト商材レジストリ（シード）
#
# 対象: AIツール/SaaS × YouTube Shorts × 日本語（docs/plans/shortvideo-affiliate-monetization-roadmap.md）
# 用途: `pantheon affiliate seed` がこれを ~/.pantheon/affiliate_programs.json に取り込む。
#       台本生成(generator)は has_affiliate=true を優先してツールを割り当てる。
#
# 重要: 料率・参加可否・recurring 条件は時期で変わる。本リストは「出発点」であり、
#       実際の参加可否と最新料率は各 ASP / プログラムで必ず確認すること。
#       has_affiliate=false は「公開アフィリが無い → 収益源にせず集客ネタに使う」もの。
#
# fields:
#   name           表示名
#   category       video / voice / writing / design / automation / research / general
#   network        asp_a8 / asp_moshimo / asp_afb / partnerstack / impact / firstpromoter / direct / amazon / none
#   url            紹介/登録の出発点（実リンクは各自取得）
#   commission     料率の目安（文字列・要確認）
#   recurring      継続報酬か（true=積み上がる本命）
#   has_affiliate  公開アフィリの有無（false=集客ネタ専用）
#   japan_ok       日本から参加/紹介しやすいか（true/partial/false）
#   tier           a(主力) / b(補完) / c(集客ネタ)
#   topics         動画ネタの切り口（フック生成のヒント）
#   notes          補足

programs:
  - name: ElevenLabs
    category: voice
    network: firstpromoter
    url: https://elevenlabs.io/affiliates
    commission: "約22%（継続）"
    recurring: true
    has_affiliate: true
    japan_ok: partial
    tier: a
    topics: ["AIナレーション", "声のクローン", "多言語吹き替え", "YouTube用音声"]
    notes: "音声AIの定番。ショートのナレーション需要と直結。"

