# 参加すべき ASP / ネットワーク（多数のSaaS案件にここからアクセス）
networks:
  - id: asp_a8
    name: A8.net
    url: https://www.a8.net/
    note: "国内最大級ASP。AI/SaaS/スクール案件多数。審査ゆるめ。"
  - id: asp_moshimo
    name: もしもアフィリエイト
    url: https://af.moshimo.com/
    note: "Amazon/楽天もまとめやすい。W報酬。"
  - id: asp_afb
    name: afb
    url: https://www.afi-b.com/
    note: "SaaS/サービス案件。料率良いことが多い。"
  - id: impact
    name: Impact
    url: https://impact.com/
    note: "海外SaaSの直アフィリ基盤（Canva/Notion/Synthesia等）。"
  - id: partnerstack
    name: PartnerStack
    url: https://partnerstack.com/
    note: "海外SaaSのrecurringアフィリ（Jasper/Descript/HeyGen等）。"
  - id: firstpromoter
    name: FirstPromoter
    url: https://firstpromoter.com/
    note: "ElevenLabs等が採用。各ツール側で申請。"
