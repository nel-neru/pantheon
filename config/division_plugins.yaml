# division_plugins.yaml — 事業部プラグインのカタログ（2階層プラグインの「事業部」側）
#
# 各プラグインは既存 Organization へ追加できる 1 事業部（Division）の定義。
# `department` は core/org_factory._build_division が食べる dict（org create のテンプレと同形）。
# 追加は `pantheon plugin add-division --org <name> --plugin <id>` または
# GUI マーケットプレイス（POST /api/organizations/{org}/divisions）から行う。
#
# 原則「共有は極力避ける」（Master Plan §13-3）— 追加した事業部はその org 専用。

plugins:
  - id: x_audience
    label: X集客事業部
    category: audience
    description: X（旧Twitter）で集客し、note/商品へ送客する入口事業部
    department:
      name: X集客事業部
      type: audience_development
      mission: X で獲得・エンゲージメントを高め、収益化事業部へ送客する
      teams:
        - name: Growth Team
          mission: フォロワー獲得・エンゲージメント・送客導線
          required_skills:
            - audience_growth
            - performance_marketing
        - name: Post Content Team
          mission: 短文ポスト・スレッド・固定ポストの企画制作
          required_skills:
            - content_strategy
            - audience_growth

  - id: note_monetization
    label: note販売事業部
    category: monetization
    description: note 有料記事の企画・セールスライティング・価格最適化で直接収益化する
    department:
      name: note販売事業部
      type: monetization
      mission: 有料note の制作・販売・リピート促進で売上を作る
      teams:
        - name: Sales Writing Team
          mission: 有料記事のセールスライティングと構成
          required_skills:
            - content_strategy
            - performance_marketing
        - name: Pricing Team
          mission: 価格設計・A/Bテスト・客単価最適化
          required_skills:
            - performance_analysis
            - performance_marketing

  - id: affiliate_monetization
    label: アフィリエイト事業部
    category: monetization
    description: 比較・レビュー記事でアフィリエイト収益を作る（PR表記コンプライアンス込み）
    department:
      name: アフィリエイト事業部
      type: monetization
      mission: 検索流入を収益化記事に変換し、PR 表記を守って収益を作る
      teams:
        - name: Review Content Team
          mission: 比較・レビュー記事の企画制作とコンプライアンス
          required_skills:
            - content_strategy
            - knowledge_curation

  - id: content_production
    label: コンテンツ制作事業部
    category: content
    description: 各チャネル向けの発信用コンテンツを企画・草稿・品質管理する
    department:
      name: コンテンツ制作事業部
      type: content_production
      mission: 投稿テーマ設計と発信用コンテンツの草稿・品質管理
      teams:
        - name: Editorial Team
          mission: 記事・台本・概要欄の制作と品質管理
          required_skills:
            - content_strategy
            - knowledge_curation

  - id: analytics_operations
    label: 分析・運用事業部
    category: operations
    description: 成果分析・レポート・トレンド監視で他事業部の意思決定を支える
    department:
      name: 分析・運用事業部
      type: org_evolution
      mission: 成果データの分析・レポートとトレンド監視で全体最適を支援する
      teams:
        - name: Analytics Team
          mission: KPI 分析・レポート自動生成・改善提案
          required_skills:
            - performance_analysis
            - deep_research

  - id: full_funnel
    label: フルファネル事業部（集客→収益化）
    category: full_funnel
    description: 集客からコンテンツ・販売・分析までを1事業部で通すフルファネル（§6.2 Full Funnel）
    department:
      name: フルファネル事業部
      type: audience_development
      mission: 集客→コンテンツ→収益化→分析のファネル全体を一気通貫で回す
      teams:
        - name: Growth Team
          mission: フォロワー獲得・エンゲージメント・送客導線
          required_skills:
            - audience_growth
            - performance_marketing
        - name: Audience Content Team
          mission: 集客用コンテンツの企画制作
          required_skills:
            - content_strategy
            - audience_growth
        - name: Sales Writing Team
          mission: 収益化コンテンツのセールスライティングと構成
          required_skills:
            - content_strategy
            - performance_marketing
        - name: Pricing Team
          mission: 価格設計・A/Bテスト・客単価最適化
          required_skills:
            - performance_analysis
            - performance_marketing

  # --- PT-2 §7.4 テンプレ形エントリ -------------------------------------------
  # department を書かず id/label/category だけ指定すると、ローダが
  # core.orchestration.plugin_templates.CATEGORY_PRESETS から自動展開する
  # （「テンプレ化」）。category: audience/content/monetization/operations。

  # 1. Audience / Traffic（集客手段）
  - id: youtube_audience
    label: YouTube集客事業部
    category: audience
    description: YouTube ショート/長尺で集客し、収益化事業部へ送客する
  - id: tiktok_reels_audience
    label: TikTok/Reels集客事業部
    category: audience
    description: TikTok・Instagram Reels の短尺動画で新規リーチを獲得する
  - id: seo_blog_audience
    label: SEOブログ集客事業部
    category: audience
    description: SEOブログ / note 無料記事で検索流入を集め送客する
  - id: newsletter_audience
    label: Newsletter集客事業部
    category: audience
    description: メールマガジンで見込み客を育成し送客・販売へつなぐ

  # 2. Content & Product（商品・コンテンツ作成）
  - id: digital_product
    label: デジタルプロダクト制作事業部
    category: content
    description: テンプレ・素材・ツール等のデジタルプロダクトを企画制作する
  - id: prompt_pack
    label: AIツール/プロンプトパック事業部
    category: content
    description: AIプロンプトパックや小型AIツールを制作し販売物にする
  - id: online_course
    label: オンライン講座/メンバーシップ事業部
    category: content
    description: 講座・メンバーシップ向けの継続コンテンツを企画制作する
  - id: ebook_report
    label: 電子書籍/レポート事業部
    category: content
    description: 電子書籍・有料レポートを企画・執筆・編集する

  # 3. Monetization（直接収益化）
  - id: membership_subscription
    label: メンバーシップ/サブスク事業部
    category: monetization
    description: 継続課金（メンバーシップ/サブスク）で安定収益を作る
  - id: digital_product_sales
    label: デジタル商品販売事業部
    category: monetization
    description: デジタル商品の販売導線・価格最適化で収益化する
  - id: ad_revenue
    label: 広告収益化事業部
    category: monetization
    description: 広告・タイアップで収益化し、面の価値を最大化する

  # 5. Operations & Analytics（運用支援）
  - id: post_scheduler
    label: 投稿スケジューラ事業部
    category: operations
    description: 投稿・記事の編成と公開スケジュール自動化で運用を支える
  - id: competitor_trend_monitor
    label: 競合・トレンド監視事業部
    category: operations
    description: 競合とトレンドを監視し、各事業部の意思決定材料を供給する
  - id: ab_testing
    label: A/Bテスト事業部
    category: operations
    description: 見出し・価格・導線の A/B テストを設計し改善提案を出す
  - id: crm_lite
    label: 顧客管理(簡易CRM)事業部
    category: operations
    description: 顧客・見込み客の管理とフォロー導線を簡易 CRM として整える
