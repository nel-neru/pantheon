# 会社（Company）プラグインの manifest カタログ（P2.2）。
#
# 2階層プラグイン構想の「会社」側を正式な manifest として列挙する。
# 各 manifest は GUI/CLI に「収益化テンプレートとしての会社」を提示するための
# 宣言的メタデータであり、構造（Division/Team/SpecialistAgent）そのものは持たない
# （実体の組み立ては `pantheon org create --genre` など既存の量産経路が担当する）。
#
# ローダ: core/orchestration/company_plugins.py（load_company_plugin_manifests）。
# 必須キー: id。欠落/破損時はローダ側で安全に握りつぶす（生成を止めない）。
# その他のキー（label/genre/description/initial_kpis/weekly_review/human_tasks/divisions）は
# 表示・初期化のヒントであり、欠けていてもカタログ全体は壊れない。

schema_version: "1.0"

plugins:
  - id: note_sales
    label: note 販売会社
    genre: digital_content
    description: >-
      note でデジタルコンテンツ（有料記事・マガジン）を制作し継続販売する会社。
      下書き工場として記事を量産し、公開と価格設定は人手の承認ゲートを通す。
    initial_kpis:
      - 月間有料記事公開数
      - 有料記事の売上（円）
      - 記事あたり購入転換率
      - フォロワー増加数
    weekly_review: >-
      週次で「公開した記事数 × 平均単価 × 転換率」を確認し、売れ筋テーマへ
      次週の制作枠を寄せる。伸びない下書きはアーカイブし制作コストを回収する。
    human_tasks:
      - 有料記事の公開承認と価格設定
      - サムネイル/タイトルの最終確認
      - 読者コメントへの一次対応
    divisions:
      - コンテンツ企画部
      - 記事制作部
      - 販売・マーケティング部

  - id: affiliate
    label: アフィリエイト会社
    genre: affiliate_marketing
    description: >-
      商品レビュー・比較記事を制作し、アフィリエイトリンク経由の成果報酬で
      収益化する会社。検索流入を主軸に、案件選定と記事更新を回し続ける。
    initial_kpis:
      - 公開レビュー記事数
      - アフィリエイトクリック数
      - 成果コンバージョン数
      - 成果報酬額（円）
    weekly_review: >-
      週次でクリック→コンバージョン→報酬のファネルを見て、報酬単価と
      転換率の高い案件へ記事更新リソースを再配分する。失効リンクを点検する。
    human_tasks:
      - アフィリエイト案件・提携プログラムの最終選定
      - 公開前のステマ規制/表記コンプライアンス確認
      - 報酬実績データの取り込み確認
    divisions:
      - 案件リサーチ部
      - レビュー記事制作部
      - SEO・流入最適化部

  - id: video_production
    label: 動画制作会社
    genre: video_production
    description: >-
      短尺/長尺の動画コンテンツ（台本・構成・テロップ・サムネ案）を量産する会社。
      core/content の short_video kind 等で台本を生成し、撮影・投稿は人手。集客や
      収益化（アフィリ/販売）の会社と handoff（content_brief）で合成して事業化する。
    initial_kpis:
      - 制作本数（週/月）
      - 平均視聴維持率
      - 公開率（制作→投稿）
    weekly_review: >-
      週次で制作本数と視聴維持率を見て、当たったフォーマット/テーマへ次週の制作枠を寄せる。
      収益化会社からのフィードバック（成約に効いた動画）を制作方針へ反映する。
    human_tasks:
      - 動画の撮影・編集・投稿（コンテンツの最終確認、PR/景表法 表記の確認）
      - サムネイル/タイトルの最終確認
    divisions:
      - 企画・構成部
      - 台本制作部
      - 投稿運用・分析部

  - id: sns_growth
    label: SNS 集客→収益化会社
    genre: social_media
    description: >-
      SNS でフォロワーを集め、認知を商品/サービス/送客へつなげて収益化する会社。
      投稿を継続生成しつつ、収益化導線（リンク・案件）への接続は人手で承認する。
    initial_kpis:
      - 週間投稿数
      - インプレッション数
      - エンゲージメント率
      - フォロワー増加数
      - 送客クリック数
    weekly_review: >-
      週次でインプレッションとエンゲージメントの伸びを確認し、反応の良い
      フォーマットへ投稿比率を寄せる。収益化導線のクリックを併せて追跡する。
    human_tasks:
      - 収益化導線（リンク/PR 案件）への接続承認
      - ブランドトーンを外れた投稿の差し戻し
      - DM/コメントでの個別エンゲージメント対応
    divisions:
      - コンテンツ企画部
      - 投稿運用部
      - 収益化・送客部

  - id: membership_community
    label: 会員制コミュニティ会社
    genre: membership_subscription
    description: >-
      月額/年額の会員制コミュニティを運営し、継続課金（サブスク）で収益化する会社。
      限定コンテンツと交流の場を提供し、定着率（チャーン低減）を主指標に回す。
    initial_kpis:
      - 有料会員数
      - 月次経常収益（MRR・円）
      - 解約率（チャーン）
      - 会員コンテンツ公開数
    weekly_review: >-
      週次で新規入会・解約・MRR を確認し、解約理由の多い導線を改善する。
      反応の良い限定コンテンツへ制作枠を寄せ、継続率を底上げする。
    human_tasks:
      - 月額/年額プランの価格・特典の最終承認
      - 決済（サブスク課金）連携の設定確認
      - 会員からの問い合わせ/モデレーションの一次対応
    divisions:
      - 会員獲得・集客部
      - 限定コンテンツ制作部
      - 継続課金・収益化部

  - id: digital_shop
    label: デジタル商品ショップ会社
    genre: digital_product
    description: >-
      テンプレート・素材・ツールなどのデジタル商品を制作し、単品販売で収益化する会社。
      商品ラインナップを増やしつつ、検索/SNS 流入から購入への転換を最適化する。
    initial_kpis:
      - 公開商品数
      - 商品販売数
      - 売上（円）
      - 購入転換率
    weekly_review: >-
      週次で商品別の売上と転換率を見て、売れ筋カテゴリへ新商品制作を寄せる。
      流入の多い導線のランディングを改善し、客単価を引き上げる。
    human_tasks:
      - 新商品の公開承認と価格設定
      - 決済/配信（ダウンロード）連携の確認
      - 返金/サポート問い合わせの一次対応
    divisions:
      - 商品企画・制作部
      - 集客・流入最適化部
      - 販売・収益化部

  - id: online_course
    label: オンライン講座会社
    genre: education
    description: >-
      特定テーマの学習コンテンツ（動画講座・教材）を制作し、講座販売で収益化する会社。
      無料コンテンツで集客し、有料講座への転換と受講者の成果（満足度）を回す。
    initial_kpis:
      - 公開講座数
      - 受講申込数
      - 講座売上（円）
      - 受講完了率
    weekly_review: >-
      週次で集客→無料体験→有料申込のファネルを確認し、転換の弱い段を改善する。
      満足度の高い講座テーマへ次の制作枠を寄せ、口コミ流入を伸ばす。
    human_tasks:
      - 有料講座の公開承認と価格設定
      - 教材内容（事実確認・権利処理）の最終確認
      - 受講者サポート/質問対応の一次対応
    divisions:
      - 講座企画・教材制作部
      - 集客・マーケティング部
      - 受講者サポート・運用部

  - id: content_studio
    label: マルチプラットフォーム・コンテンツスタジオ
    genre: content_media
    description: >-
      ブログ/SNS/動画など複数プラットフォーム向けにコンテンツを量産し、
      広告・送客・案件で多面的に収益化するメディアスタジオ。1つのテーマを各媒体へ展開する。
    initial_kpis:
      - 週間コンテンツ公開数
      - 合計インプレッション数
      - 媒体横断の送客クリック数
      - 収益額（円）
    weekly_review: >-
      週次で媒体別のリーチと収益を比較し、伸びている媒体・フォーマットへ制作比率を寄せる。
      1テーマを多媒体へ再利用（リパーパス）して制作効率を上げる。
    human_tasks:
      - 各媒体への投稿・公開承認
      - 広告/案件タイアップの提携承認と表記確認
      - コメント/DM など読者対応の一次対応
    divisions:
      - コンテンツ企画・制作部
      - 媒体別投稿運用部
      - 分析・収益化部

  - id: newsletter
    label: ニュースレター事業
    genre: newsletter
    description: >-
      メールニュースレターで読者を集め、有料購読・スポンサー・送客で収益化する事業。
      無料号で集客し、有料号/メンバー特典への転換と開封・クリック率の改善を回す。
    initial_kpis:
      - 購読者数
      - 開封率
      - クリック率
      - 有料購読売上（円）
    weekly_review: >-
      週次で購読者増・開封率・有料転換を確認し、反応の良いテーマ/件名へ次号を寄せる。
      解約理由を見て配信頻度と内容のバランスを調整する。
    human_tasks:
      - 配信内容と件名の最終承認
      - 有料プラン/スポンサー枠の価格・掲載承認
      - 配信基盤（ESP）連携と到達率の確認
    divisions:
      - 集客・リスト獲得部
      - コンテンツ制作部
      - 有料化・スポンサー収益部

  - id: micro_saas
    label: マイクロSaaS事業
    genre: saas
    description: >-
      特定課題を解く小さなWebツールをサブスクリプションで提供する事業。
      ランディングと無料枠で集客し、有料転換・解約低減・機能改善を継続的に回す。
    initial_kpis:
      - サインアップ数
      - 有料転換率
      - 月次経常収益（MRR・円）
      - 解約率（チャーン）
    weekly_review: >-
      週次でサインアップ→有料転換→継続のファネルを見て、離脱の多い段を改善する。
      要望の多い機能と解約理由を制作（開発）優先度へ反映する。
    human_tasks:
      - 価格プラン・課金（サブスク決済）設定の承認
      - 新機能リリースの最終確認
      - サポート問い合わせの一次対応
    divisions:
      - 集客・マーケティング部
      - プロダクト企画・制作部
      - 継続課金・分析運用部

  - id: niche_affiliate_site
    label: ニッチ特化アフィリエイトサイト
    genre: affiliate_seo
    description: >-
      特定ニッチに絞った検索流入主体のレビュー/比較サイト。網羅的な記事制作と内部リンクで
      検索順位を取り、アフィリエイト成果報酬で収益化する（汎用アフィリ会社より検索特化）。
    initial_kpis:
      - 公開記事数
      - 検索流入数
      - アフィリエイト成果数
      - 成果報酬額（円）
    weekly_review: >-
      週次で検索流入と成果のキーワードを見て、上位化しやすい/成約に効く記事へ更新を寄せる。
      順位下落記事のリライトと失効リンク点検を回す。
    human_tasks:
      - 記事公開承認とアフィリエイト案件の最終選定
      - ステマ規制/表記コンプライアンスの確認
      - 成果実績データの取り込み確認
    divisions:
      - キーワード・案件リサーチ部
      - レビュー記事制作部
      - SEO・流入最適化部

  - id: pod_merch
    label: プリントオンデマンド物販事業
    genre: print_on_demand
    description: >-
      デザインを制作し、プリントオンデマンドで在庫を持たずにグッズ（アパレル/雑貨）を販売する事業。
      SNS/検索で集客し、売れ筋デザインの量産と単価最適化で収益化する。
    initial_kpis:
      - 公開デザイン数
      - 商品販売数
      - 売上（円）
      - 購入転換率
    weekly_review: >-
      週次でデザイン別の売上と転換率を見て、売れ筋テーマへ次の制作を寄せる。
      流入経路ごとの費用対効果を見て集客配分を調整する。
    human_tasks:
      - デザインの公開承認と著作権/商標の確認
      - POD/決済サービス連携の設定確認
      - 返品・サポート問い合わせの一次対応
    divisions:
      - デザイン企画・制作部
      - 集客・マーケティング部
      - 販売・収益化部
