# トレンド収集ソース（RSS/Atom）。無料・公開フィードのみ。X/YouTube は別 collector。
# ジャンル別エキスパート組織の素材になるよう genre を付ける。`pantheon trends collect`
# で横断収集する。追加・削除はこのファイルだけで完結する。

sources:
  - name: Hacker News Front Page
    url: https://hnrss.org/frontpage
    type: rss
    genre: ai

  - name: TechCrunch
    url: https://techcrunch.com/feed/
    type: rss
    genre: ai

  - name: The Verge
    url: https://www.theverge.com/rss/index.xml
    type: atom
    genre: ai

  - name: Indie Hackers
    url: https://www.indiehackers.com/feed.xml
    type: rss
    genre: side_business

  - name: Product Hunt
    url: https://www.producthunt.com/feed
    type: atom
    genre: side_business

  # Claude Code / Anthropic 自体のトレンド監視（リポジトリ設定の進化に反映）。
  # 複数ソースで「機能リリース」と「告知」を別経路から拾い、E フェーズ
  # （CC 設定最適化ループ）の入力が単一フィードに痩せないようにする。
  - name: Anthropic News
    url: https://www.anthropic.com/rss.xml
    type: rss
    genre: claude_code

  # Claude Code 本体のリリース Atom（GitHub 標準エンドポイント・APIキー不要）。
  # 新機能/挙動変更を一次情報で検知できる最も信号の濃い CC ソース。
  - name: Claude Code Releases
    url: https://github.com/anthropics/claude-code/releases.atom
    type: atom
    genre: claude_code

# YouTube チャンネル（APIキー不要のチャンネル RSS で最新動画を収集）。
# channel_id は チャンネルページの「共有」やソースから取得できる UC... 形式。
youtube_channels:
  - name: Fireship
    channel_id: UCsBjURrPoezykLs9EqgamOA
    genre: ai
  - name: Two Minute Papers
    channel_id: UCbfYPyITQ-7l4upoX8nvctg
    genre: ai

# Grok ブラウザ自動操作リサーチ（grok.com に一度ログイン → セッション再利用で自動駆動）。
# RSS/YouTube と違い「X/GitHub/YouTube/Web を横断して合成したトレンド」を取れる。
#   接続:   pantheon trends connect-grok（ヘッドフルブラウザで手動ログイン・1回だけ）
#   収集:   pantheon trends collect --source grok ／ アドホックは --grok-query "..."
# クエリは固定ジャンルに縛らず自由に編集してよい（全ジャンル横断が既定の seed）。
# enabled は接続して動作確認できてから true にする opt-in（既定 false で自動収集されない）。
grok_research:
  enabled: false
  queries:
    - name: ai_dev
      query: "直近7日でX/GitHub/YouTube/Webで話題のAI開発・LLM・エージェントの最新トレンド"
      genre: ai
      lookback_days: 7
      topics: [llm, agent]
    - name: side_business
      query: "直近7日でnote/個人副業/コンテンツ収益で伸びている題材とフォーマット"
      genre: side_business
      lookback_days: 7
      topics: [note, monetization]
    - name: video
      query: "直近7日でバズっている短尺/無言ストーリー系YouTube動画の傾向"
      genre: video
      lookback_days: 7
      topics: [shorts, story]
    - name: claude_code
      query: "直近7日のClaude Code/Anthropicの新機能・ベストプラクティス"
      genre: claude_code
      lookback_days: 7
      topics: [claude_code]
