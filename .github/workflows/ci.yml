name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,web]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        # Windows 既知の 2 失敗（chmod 0o600）は Linux では発生しない想定。
        # PANTHEON_NO_CLAUDE は tests/conftest.py が設定（claude CLI 不要・完全オフライン）。
        run: python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Test (vitest)
        run: npm test
      - name: Build
        run: npm run build
