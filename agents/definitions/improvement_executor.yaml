# improvement_executor.yaml
# 承認済みの改善提案をコードに適用し、GitHub PR を作成するエージェント

schema_version: "1.0"
name: ImprovementExecutor
capability_id: agent:improvement_executor
description: 承認済みの改善提案をコードに適用し、GitHub PR を作成する

skills:
  - tool_integration
  - prompt_engineering

tools:
  - read_file
  - write_file
  - create_pr
  - run_tests

behavior: |
  承認済みの改善提案のみを対象に、元のコードに正確に変更を適用してください。
  変更は提案の内容に限定し、無関係な箇所は絶対に変更しないでください。
  変更後は必ず構文的に正しいコードになっていることを確認してください。

# Python 専用クラスを使用（ファイル書き込み・PR作成ロジックが必要）
implementation: agents.improvement_executor_agent.ImprovementExecutorAgent

response_format:
  type: json
  fields:
    - modified_content
    - change_summary
